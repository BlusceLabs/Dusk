name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode google-services.json
        working-directory: app
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew app:assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Read version and rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="Dusk-v${VERSION}.apk"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/${APK_NAME} || true
          echo "VERSION=v${VERSION}"           >> "$GITHUB_ENV"
          echo "APK_NAME=${APK_NAME}"          >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}"       >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}"        >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dusk-android-${{ env.VERSION }}
          path: app/build/outputs/apk/release/${{ env.APK_NAME }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Dusk ${{ env.VERSION }}"
          body: |
            ## Dusk ${{ env.VERSION }}

            Built from commit `${{ env.SHORT_SHA }}` on `${{ github.ref_name }}`.

            ### Install
            1. Download `${{ env.APK_NAME }}` below
            2. On your Android device go to **Settings → Install unknown apps** and allow your browser/file manager
            3. Open the downloaded APK and tap **Install**

            > Requires Android 8.0 (API 26) or higher
          files: app/build/outputs/apk/release/${{ env.APK_NAME }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        run: |
          echo "## Dusk ${{ env.VERSION }} Built ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ env.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK | \`${{ env.APK_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ env.SHORT_SHA }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The APK is attached to the [GitHub Release](../../releases/tag/${{ env.RELEASE_TAG }}) 🚀" >> "$GITHUB_STEP_SUMMARY"
