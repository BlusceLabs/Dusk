# CircleCI Android APK Build Config
# 1. Go to https://app.circleci.com/setup/github  →  Authorize & select hoodDevs/Dusk
# 2. The build will auto-trigger on next push to main
#
# Optional: set env vars in CircleCI UI → Project Settings → Environment Variables
#   - KEYSTORE_B64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD (for release signed APK)
#   - If not set, it builds a debug APK

version: 2.1

orbs:
  android: circleci/android@2.5.0

jobs:
  build-apk:
    executor:
      name: android/android-machine
      resource-class: large
    steps:
      - checkout

      - restore_cache:
          key: android-gradle-deps-{{ checksum "gradle/libs.versions.toml" }}

      - run:
          name: Decode signing key (optional)
          command: |
            if [ -n "$KEYSTORE_B64" ]; then
              echo "$KEYSTORE_B64" | base64 -d > app/keystore.jks
              echo "Keystore decoded ✅"
            else
              echo "No KEYSTORE_B64 — building debug APK"
            fi

      - run:
          name: Build APK
          command: |
            if [ -n "$KEYSTORE_B64" ]; then
              ./gradlew assembleRelease \
                -Pandroid.injected.signing.store.file=app/keystore.jks \
                -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
                -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
                -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            else
              ./gradlew assembleDebug
            fi

      - save_cache:
          key: android-gradle-deps-{{ checksum "gradle/libs.versions.toml" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper

      - store_artifacts:
          path: app/build/outputs/apk
          destination: apk

      - run:
          name: Summary
          command: |
            echo "=== APK Build Summary ==="
            find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

workflows:
  version: 2
  build:
    jobs:
      - build-apk:
          filters:
            branches:
              only: main